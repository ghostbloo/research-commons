name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test

  frontend:
    name: Frontend (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      # npm workspace: install from the root (a standalone `npm ci` in frontend/
      # can't resolve the @anima-labs/research-commons-shared workspace sibling),
      # then build shared so vue-tsc can resolve its types.
      - run: npm ci
      - run: npm run build:shared
      - run: npm run typecheck -w frontend
      - run: npm run test -w frontend
